    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 40px 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            user-select: none;
        }

        .error-page h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .error-page p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 32px;
            max-width: 400px;
        }

        .error-sparkline {
            width: 200px;
            height: 40px;
            margin-bottom: 40px;
            opacity: 0.2;
        }

        .error-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>

<body>
    <div class="container">
        <div class="error-page">
            <div class="error-code">404</div>
            <canvas class="error-sparkline" id="errorSparkline" aria-hidden="true"></canvas>
            <h1>No data here.</h1>
            <p>This page doesn't exist — but unlike a missing HRV reading, we can point you somewhere useful.</p>
            <div class="error-links">
                <a href="/" class="btn-primary">Filament Labs</a>
                <a href="/hrvspark/" class="btn-secondary">HRVSpark</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('errorSparkline');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width, h = rect.height, pad = 6;
            const points = [];
            for (let i = 0; i < 30; i++) points.push(Math.random());

            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, 'rgba(51, 142, 247, 0)');
            grad.addColorStop(0.3, 'rgba(51, 142, 247, 0.7)');
            grad.addColorStop(0.7, 'rgba(255, 124, 30, 0.7)');
            grad.addColorStop(1, 'rgba(255, 124, 30, 0)');

            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            const step = w / (points.length - 1);
            for (let i = 0; i < points.length; i++) {
                const x = i * step;
                const y = pad + (1 - points[i]) * (h - pad * 2);
                if (i === 0) ctx.moveTo(x, y);
                else {
                    const px = (i - 1) * step;
                    const py = pad + (1 - points[i - 1]) * (h - pad * 2);
                    ctx.quadraticCurveTo(px, py, (px + x) / 2, (py + y) / 2);
                }
            }
            ctx.stroke();
        })();
    </script>
